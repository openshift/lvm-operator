apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-lvm-topolvm-io-v1alpha1-lvmcluster
  failurePolicy: Fail
  name: mlvmcluster.kb.io
  rules:
  - apiGroups:
    - lvm.topolvm.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    resources:
    - lvmclusters
  sideEffects: None
