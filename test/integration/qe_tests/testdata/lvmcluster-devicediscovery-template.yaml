kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: lvmcluster-devicediscovery-template
objects:
- apiVersion: lvm.topolvm.io/v1alpha1
  kind: LVMCluster
  metadata:
    name: ${NAME}
    namespace: ${NAMESPACE}
  spec:
    storage:
      deviceClasses:
      - name: ${DEVICECLASS}
        default: true
        deviceDiscoveryPolicy: ${DEVICE_DISCOVERY_POLICY}
        fstype: ${FSTYPE}
        deviceSelector:
          forceWipeDevicesAndDestroyAllData: true
        thinPoolConfig:
          name: thin-pool-1
          sizePercent: 90
          overprovisionRatio: 10
parameters:
- name: NAME
  required: true
- name: NAMESPACE
  required: true
  value: "openshift-lvm-storage"
- name: DEVICECLASS
  required: true
  value: "vg1"
- name: DEVICE_DISCOVERY_POLICY
  required: true
  value: "Static"
- name: FSTYPE
  required: true
  value: "xfs"
