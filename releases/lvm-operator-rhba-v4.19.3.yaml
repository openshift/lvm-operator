spec:
  releasePlan: lvm-operator-production-releaseplan-4-19
  snapshot: lvm-operator-4-19-20260604-095234-000
  data:
    releaseNotes:
      description: |
        After a successful LVMS upgrade, the latest lvms-operator SHA image should be running.

        This erratum implements the following changes:

        - Adds rate limiting to file lock controller to prevent excessive log generation
        - Bumps gRPC-Go to 1.79.3 to address CVE-2026-33186 authorization bypass vulnerability

        Users of LVMS are advised to upgrade to the latest version in OpenShift Container Platform, which fixes these bugs and adds these enhancements.
      issues:
        fixed:
          - id: OCPBUGS-63446
            source: issues.redhat.com
          - id: OCPBUGS-57389
            source: issues.redhat.com
